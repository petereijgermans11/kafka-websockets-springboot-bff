spring.application.name=tps-websocket-server
server.port=${SERVER_PORT:8080}

# Kafka consumer
spring.kafka.bootstrap-servers=${KAFKA_BROKERS:localhost:29092}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=nl.prorail.tps.websocket.model.TreinPositieBericht
spring.kafka.consumer.auto-offset-reset=latest

# TPS topic
kafka.topic=${KAFKA_TOPIC:tps-treinpositie}

# RITS topic
kafka.topic.rits=${KAFKA_TOPIC_RITS:rits-infratoestand}

# JWT validatie via Keycloak JWKS endpoint (jwk-set-uri ipv issuer-uri om issuer mismatch te vermijden
# tussen publieke URL http://localhost:8008 in het token en interne Docker URL http://keycloak:8000)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://keycloak:8000/realms/greeter/protocol/openid-connect/certs}
