worker_processes auto;
error_log /dev/stderr info;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/usr/local/openresty/lualib/?.lua;/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/nginx/?.lua;;";

    lua_shared_dict discovery 1m;
    lua_shared_dict jwks 1m;
    lua_shared_dict sessions 10m;

    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    access_log /dev/stdout;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # TPS WebSocket server (Spring Boot)
    upstream tps_websocket_backend {
        server websocket-server:8080;
    }

    server {
        listen 8080;
        server_name localhost;

        # Angular dev server origin (poort 4300 — 4200 is gereserveerd voor spoor-viewer)
        set $ORIGIN http://localhost:4300;

        location /health {
            access_log off;
            return 200 "OK\n";
        }

        # ── OIDC: Login ──────────────────────────────────────────────────────
        location = /login {
            access_by_lua_block {
                local oidc_helper = require "oidc_helper"
                local config = require "config"

                local opts = {
                    authorization_endpoint = config.AUTHORIZATION_ENDPOINT,
                    token_endpoint         = config.TOKEN_ENDPOINT,
                    client_id              = config.CLIENT_ID,
                    client_secret          = config.CLIENT_SECRET,
                    redirect_uri           = config.REDIRECT_URI,
                    scope                  = config.SCOPE
                }

                local auth_url = oidc_helper.build_authorization_url(opts)

                local state_data = {
                    state     = ngx.ctx.oidc_state,
                    nonce     = ngx.ctx.oidc_nonce,
                    timestamp = ngx.time()
                }
                local state_json   = require("cjson").encode(state_data)
                local state_cookie = ngx.encode_base64(state_json)
                ngx.header["Set-Cookie"] = "oidc_state=" .. state_cookie .. "; Path=/; HttpOnly; SameSite=Lax; Max-Age=300"

                return ngx.redirect(auth_url)
            }
        }

        # ── OIDC: Callback ───────────────────────────────────────────────────
        location /callback {
            content_by_lua_block {
                local oidc_helper = require "oidc_helper"
                local cjson       = require "cjson"
                local config      = require "config"

                local args  = ngx.req.get_uri_args()
                local code  = args.code
                local state = args.state

                if not code then
                    ngx.status = 400
                    ngx.say("Missing authorization code")
                    return ngx.exit(400)
                end

                local state_cookie = ngx.var.cookie_oidc_state
                if not state_cookie then
                    ngx.status = 400
                    ngx.say("Missing state cookie")
                    return ngx.exit(400)
                end

                local state_json = ngx.decode_base64(state_cookie)
                if not state_json then
                    ngx.status = 400
                    ngx.say("Invalid state cookie")
                    return ngx.exit(400)
                end

                local ok, state_data = pcall(cjson.decode, state_json)
                if not ok or not state_data or state_data.state ~= state then
                    ngx.status = 400
                    ngx.say("Invalid state parameter")
                    return ngx.exit(400)
                end

                ngx.header["Set-Cookie"] = "oidc_state=; Path=/; HttpOnly; SameSite=Lax; Max-Age=0"

                local opts = {
                    token_endpoint = config.TOKEN_ENDPOINT,
                    client_id      = config.CLIENT_ID,
                    client_secret  = config.CLIENT_SECRET,
                    redirect_uri   = config.REDIRECT_URI
                }

                local tokens, err = oidc_helper.exchange_code_for_tokens(opts, code)
                if err then
                    ngx.log(ngx.ERR, "Token exchange error: ", err)
                    ngx.status = 500
                    ngx.say("Authentication failed: " .. err)
                    return ngx.exit(500)
                end

                local id_token_parts = {}
                for part in string.gmatch(tokens.id_token, "[^%.]+") do
                    table.insert(id_token_parts, part)
                end

                local payload_json = ngx.decode_base64(id_token_parts[2])
                local ok2, payload = pcall(cjson.decode, payload_json)

                local session_data = {
                    access_token        = tokens.access_token,
                    id_token            = tokens.id_token,
                    refresh_token       = tokens.refresh_token,
                    sub                 = ok2 and payload.sub or nil,
                    email               = ok2 and payload.email or nil,
                    name                = ok2 and payload.name or nil,
                    preferred_username  = ok2 and payload.preferred_username or nil
                }

                local session_cookie = oidc_helper.set_session(session_data, 3600)
                ngx.header["Set-Cookie"] = session_cookie

                ngx.header["Content-Type"]  = "text/html; charset=utf-8"
                ngx.header["Cache-Control"] = "no-cache, no-store, must-revalidate"
                ngx.say([[
                    <!DOCTYPE html><html><head>
                    <meta http-equiv="refresh" content="0;url=http://localhost:4300">
                    </head><body>
                    <script>setTimeout(function(){ window.location.href='http://localhost:4300'; },500);</script>
                    </body></html>
                ]])
                return ngx.exit(ngx.HTTP_OK)
            }
        }

        # ── OIDC: Logout ─────────────────────────────────────────────────────
        location /logout {
            content_by_lua_block {
                local oidc_helper = require "oidc_helper"
                local session     = oidc_helper.get_session()

                local clear_cookie = oidc_helper.clear_session()
                ngx.header["Set-Cookie"] = clear_cookie

                if not session or not session.id_token then
                    return ngx.redirect(ngx.var.ORIGIN)
                end

                local keycloak_logout =
                    "http://localhost:8008/realms/greeter/protocol/openid-connect/logout" ..
                    "?post_logout_redirect_uri=" .. ngx.escape_uri("http://localhost:4300") ..
                    "&id_token_hint="            .. ngx.escape_uri(session.id_token)

                return ngx.redirect(keycloak_logout)
            }
        }

        # ── API: Gebruikersinfo ───────────────────────────────────────────────
        location = /api/user {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      $ORIGIN always;
                add_header 'Access-Control-Allow-Credentials' 'true'  always;
                add_header 'Access-Control-Allow-Methods'     'GET, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age'           1728000;
                return 204;
            }

            access_by_lua_block {
                local oidc_helper = require "oidc_helper"
                local cjson       = require "cjson"

                ngx.header["Access-Control-Allow-Origin"]      = ngx.var.ORIGIN
                ngx.header["Access-Control-Allow-Credentials"] = "true"

                local session = oidc_helper.get_session()
                if not session or not session.access_token then
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({ error = "Not authenticated" }))
                    return ngx.exit(401)
                end

                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({
                    authenticated = true,
                    sub           = session.sub,
                    email         = session.email,
                    name          = session.name,
                    username      = session.preferred_username
                }))
                return ngx.exit(200)
            }
        }

        # ── Keycloak proxy (browser redirects) ───────────────────────────────
        location ~ ^/(realms|resources)/ {
            proxy_pass         http://keycloak:8000;
            proxy_set_header   Host                $host:8008;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;
            proxy_set_header   X-Forwarded-Port    8008;
        }

        # ── TPS WebSocket (beveiligd via BFF) ────────────────────────────────
        # Matcht /ws en /ws/* (native WebSocket + eventuele SockJS sub-paden)
        location /ws {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      $ORIGIN always;
                add_header 'Access-Control-Allow-Credentials' 'true'  always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Content-Type, Authorization' always;
                add_header 'Access-Control-Max-Age'           1728000;
                return 204;
            }

            access_by_lua_block {
                local oidc_helper = require "oidc_helper"
                local cjson       = require "cjson"

                ngx.header["Access-Control-Allow-Origin"]      = ngx.var.ORIGIN
                ngx.header["Access-Control-Allow-Credentials"] = "true"

                local session = oidc_helper.get_session()
                if not session or not session.access_token then
                    ngx.log(ngx.ERR, "WebSocket geweigerd — geen geldige sessie")
                    ngx.status = 401
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say(cjson.encode({ error = "WebSocket vereist authenticatie" }))
                    return ngx.exit(401)
                end

                ngx.log(ngx.ERR, "WebSocket geauthenticeerd voor: ", session.sub or "unknown")
                ngx.req.set_header("Authorization", "Bearer " .. session.access_token)
                ngx.req.set_header("X-User-Id",     session.sub or "")
            }

            add_header 'Access-Control-Allow-Origin'      $ORIGIN always;
            add_header 'Access-Control-Allow-Credentials' 'true'  always;

            proxy_http_version 1.1;
            proxy_set_header   Upgrade             $http_upgrade;
            proxy_set_header   Connection          $connection_upgrade;
            proxy_set_header   Host                $host;
            proxy_set_header   X-Real-IP           $remote_addr;
            proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto   $scheme;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
            proxy_buffering    off;

            proxy_pass http://tps_websocket_backend;
        }

        # ── Root redirect naar Angular ────────────────────────────────────────
        location = / {
            return 302 http://localhost:4300;
        }
    }
}
